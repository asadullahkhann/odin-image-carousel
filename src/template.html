<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Shark</title>
  </head>
  <body>
    <header>
      <h1><img src="./images/shark-svgrepo-com.svg" alt="shark" />SVG shark</h1>
    </header>
    <div class="content">
      <div class="frame">
        <button class="prev-btn">
          <img src="./images/arrow-prev.svg" alt="arrow-left"/>
        </button>
        <div class="slides">
          <img class="hide" src="./images/forest-and-mountain.svg" alt="forest-and-mountain">
          <img class="hide" src="./images/bridge-at-night.svg" alt="bridge-at-night-"/>
          <img class="hide" src="./images/cityscape-at-dusk.svg" alt="cityscape-at-dusk" />
          <img class="hide" src="./images/forest-night.svg" alt="forest-night"/>
          <img class="hide" src="./images/national-park.svg" alt="national-park" />
          <img class="hide" src="./images/san-francisco-bridge-at-night.svg" alt="san-francisco-bridge-at-night" />
          <img class="hide" src="./images/night-with-stars-1.svg" alt="night-with-stars-1" />
          <img class="hide" src="./images/national-park-2.svg" alt="national-park-2" />
          <img class="hide" src="./images/night-with-stars-2.svg" alt="night-with-stars-2" />
          <img class="hide" src="./images/ship.svg" alt="ship" />
          <img class="hide" src="./images/night-with-stars-3.svg" alt="night-with-stars-3" />
          <img class="hide" src="./images/mountain-landscape.svg" alt="mountain-landscape">
        </div>
        <button class="next-btn">
          <img src="./images/arrow-next.svg" alt="arrow-right"/>
        </button>
        <div class="circles">
          <div class="circle filled"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
        </div>
      </div>
    </div>
    <footer>
      <p>
        Coded by
        <a href="https://github.com/asadullahkhann">AsadUllahKhaNn
          <img src="./images/github-142-svgrepo-com.svg" alt="github-mark"/>
        </a>
      </p>
    </footer>
  </body>
</html>
